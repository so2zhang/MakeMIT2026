<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestureHand Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0a0c0e",
                        "danger": "#ef4444",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    
    <style>
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            <!-- Three.js 3D hand cloud -->
            <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
            <script src="https://unpkg.com/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
            <script>
                // Enhanced 3D point cloud showing recent IMU samples (accel X/Y/Z)
                const cloudContainer = document.getElementById('hand-cloud');
                let renderer, scene, camera, points, geometry, controls;
                const MAX_POINTS = 300;

                function initCloud() {
                    const w = cloudContainer.clientWidth;
                    const h = cloudContainer.clientHeight;
                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(w, h);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    cloudContainer.appendChild(renderer.domElement);

                    scene = new THREE.Scene();
                    camera = new THREE.PerspectiveCamera(50, w / h, 0.01, 100);
                    camera.position.set(0.8, -2.2, 1.2);
                    camera.lookAt(0,0,0);

                    // Lighting
                    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
                    dir.position.set(5, -5, 5);
                    scene.add(dir);

                    // Grid and axes for orientation
                    const grid = new THREE.GridHelper(4, 8, 0x333333, 0x111111);
                    grid.rotation.x = Math.PI/2;
                    scene.add(grid);
                    scene.add(new THREE.AxesHelper(1.2));

                    // Geometry
                    geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(MAX_POINTS * 3);
                    const colors = new Float32Array(MAX_POINTS * 3);
                    const sizes = new Float32Array(MAX_POINTS);
                    for (let i=0;i<MAX_POINTS;i++){
                        positions[i*3+0] = 0;
                        positions[i*3+1] = 0;
                        positions[i*3+2] = 0;
                        colors[i*3+0] = 0.2;
                        colors[i*3+1] = 0.6;
                        colors[i*3+2] = 1.0;
                        sizes[i] = 4.0;
                    }
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                    // Material: use sizeAttenuation for consistent visual sizes
                    const material = new THREE.ShaderMaterial({
                        uniforms: {
                            pointSize: { value: 6.0 },
                            scale: { value: 300.0 }
                        },
                        vertexShader: `
                            attribute float size;
                            attribute vec3 color;
                            varying vec3 vColor;
                            void main() {
                                vColor = color;
                                vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 );
                                gl_PointSize = size * ( 300.0 / -mvPosition.z );
                                gl_Position = projectionMatrix * mvPosition;
                            }
                        `,
                        fragmentShader: `
                            varying vec3 vColor;
                            void main() {
                                float r = length(gl_PointCoord - vec2(0.5));
                                if (r > 0.5) discard;
                                gl_FragColor = vec4(vColor, 1.0);
                            }
                        `,
                        transparent: true,
                        depthTest: true,
                    });

                    points = new THREE.Points(geometry, material);
                    scene.add(points);

                    // Controls
                    controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enablePan = true;
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.12;

                    window.addEventListener('resize', onCloudResize);
                    animateCloud();
                }

                function onCloudResize(){
                    if(!renderer) return;
                    const w = cloudContainer.clientWidth;
                    const h = cloudContainer.clientHeight;
                    renderer.setSize(w,h);
                    camera.aspect = w/h;
                    camera.updateProjectionMatrix();
                }

                function animateCloud(){
                    requestAnimationFrame(animateCloud);
                    if(controls) controls.update();
                    renderer.render(scene, camera);
                }

                // Convert telemetry arrays into 3D point cloud with color/magnitude mapping
                function updateCloudFromTelemetry(telemetry){
                    if(!geometry) return;
                    const xs = telemetry.x.history || [];
                    const ys = telemetry.y.history || [];
                    const zs = telemetry.z.history || [];
                    const n = Math.min(MAX_POINTS, Math.max(xs.length, ys.length, zs.length));

                    const pos = geometry.attributes.position.array;
                    const col = geometry.attributes.color.array;
                    const sizeAttr = geometry.attributes.size.array;

                    // We'll map the newest samples to the end of the buffer for nicer tailing
                    const base = MAX_POINTS - n;
                    for(let i=0;i<MAX_POINTS;i++){
                        const idx = i - base;
                        if(idx >= 0 && idx < n){
                            const x = xs[idx] || 0;
                            const y = ys[idx] || 0;
                            const z = zs[idx] || 0;
                            // scale up for visibility
                            pos[i*3+0] = x * 0.9;
                            pos[i*3+1] = y * 0.9;
                            pos[i*3+2] = z * 0.9;

                            const mag = Math.sqrt(x*x + y*y + z*z);
                            // color map: small magnitudes blue -> large red
                            const t = Math.min(1, mag / 2.5);
                            const r = 0.2 + 0.8 * t;
                            const g = 0.4 * (1 - t) + 0.2;
                            const b = 1.0 - 0.7 * t;
                            // fade older samples (based on idx)
                            const ageFactor = (idx) / Math.max(1, n-1);
                            const fade = 0.35 + 0.65 * (1 - ageFactor);
                            col[i*3+0] = r * fade;
                            col[i*3+1] = g * fade;
                            col[i*3+2] = b * fade;

                            sizeAttr[i] = 3.0 + 6.0 * (1 - ageFactor);
                        } else {
                            pos[i*3+0] = 0;
                            pos[i*3+1] = 0;
                            pos[i*3+2] = 0;
                            col[i*3+0] = 0.05;
                            col[i*3+1] = 0.06;
                            col[i*3+2] = 0.08;
                            sizeAttr[i] = 2.0;
                        }
                    }

                    geometry.attributes.position.needsUpdate = true;
                    geometry.attributes.color.needsUpdate = true;
                    geometry.attributes.size.needsUpdate = true;
                }

                // Initialize cloud when DOM ready
                window.addEventListener('load', () => {
                    try { initCloud(); } catch(e){ console.warn('3D cloud init failed', e); }
                });

                // Replace the telemetry poller to include cloud update
                const _origUpdateTelemetry = updateTelemetry;
                async function updateTelemetryWithCloud(){
                    await _origUpdateTelemetry();
                    try{
                        const resp = await fetch('/api/session/current');
                        const data = await resp.json();
                        if(data.status === 'active'){
                            updateCloudFromTelemetry(data.telemetry);
                        }
                    }catch(e){console.warn('cloud update failed', e)}
                }

                // replace interval caller
                // clear existing interval by ID is platform-dependent; set a new parallel interval
                setInterval(updateTelemetryWithCloud, 500);
            </script>
    // Normalize acceleration value to chart coordinates
    function normalizeValue(value) {
        // Clamp between -MAX_ACCEL and MAX_ACCEL
        value = Math.max(-MAX_ACCEL, Math.min(MAX_ACCEL, value));
        // Map to chart height (0-60), where middle is 30
        return (CHART_HEIGHT / 2) - (value / MAX_ACCEL) * (CHART_HEIGHT / 2);
    }
    
    // Generate SVG path from data array
    function generatePath(data) {
        if (data.length === 0) return `M0 ${CHART_HEIGHT / 2}`;
        
        const step = CHART_WIDTH / (data.length - 1 || 1);
        const points = data.map((val, i) => {
            const x = i * step;
            const y = normalizeValue(val);
            return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
        }).join(' ');
        
        return points;
    }
    
    // Update chart
    function updateChart(chartId, pathId, areaId, data) {
        const path = document.getElementById(pathId);
        const area = document.getElementById(areaId);
        
        if (data.length > 0) {
            const pathStr = generatePath(data);
            const lastY = normalizeValue(data[data.length - 1]);
            const firstY = normalizeValue(data[0]);
            
            path.setAttribute('d', pathStr);
            area.setAttribute('d', `${pathStr} L ${CHART_WIDTH} ${CHART_HEIGHT} L 0 ${CHART_HEIGHT} Z`);
        }
    }
    
    // Fetch and update telemetry
    async function updateTelemetry() {
        try {
            const response = await fetch('/api/session/current');
            const data = await response.json();
            
            if (data.status === 'waiting') {
                document.getElementById('status-message').innerHTML = 
                    '<p class="text-sm text-slate-600 dark:text-slate-400">⏳ No active session. Run hand_tracking.py to start capturing data.</p>';
                document.getElementById('status-badge').innerHTML = 
                    '<div class="w-2 h-2 rounded-full bg-slate-400"></div><span class="text-xs font-bold tracking-widest uppercase">Waiting</span>';
                return;
            }
            
            // Hide status message on active session
            document.getElementById('status-message').style.display = 'none';
            
            // Update fingerprint and session info
            document.getElementById('fingerprint').textContent = data.fingerprint;
            document.getElementById('session-id').textContent = `Session ID: ${data.session_id}`;
            
            // Update telemetry values
            document.getElementById('accel-x').textContent = data.telemetry.x.current.toFixed(2);
            document.getElementById('accel-y').textContent = data.telemetry.y.current.toFixed(2);
            document.getElementById('accel-z').textContent = data.telemetry.z.current.toFixed(2);
            
            // Update charts
            updateChart('chart-x', 'path-x', 'area-x', data.telemetry.x.history);
            updateChart('chart-y', 'path-y', 'area-y', data.telemetry.y.history);
            updateChart('chart-z', 'path-z', 'area-z', data.telemetry.z.history);
            
            // Update stats
            document.getElementById('event-count').textContent = 
                data.stats.events_ingested.toLocaleString();
            document.getElementById('uptime').textContent = data.stats.uptime;
            
        } catch (error) {
            console.error('Error fetching telemetry:', error);
        }
    }
    
    // Poll for updates every 500ms
    setInterval(updateTelemetry, 500);
    
    // Initial update
    updateTelemetry();
</script>

<!-- Three.js 3D hand cloud -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script>
    // Basic 3D point cloud showing recent IMU samples (accel X/Y/Z)
    const cloudContainer = document.getElementById('hand-cloud');
    let renderer, scene, camera, points, geometry;
    const MAX_POINTS = 200;

    function initCloud() {
        const w = cloudContainer.clientWidth;
        const h = cloudContainer.clientHeight;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h);
        cloudContainer.appendChild(renderer.domElement);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
        camera.position.set(0, -4, 3);
        camera.lookAt(0,0,0);

        // ambient
        const ambient = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambient);

        geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(MAX_POINTS * 3);
        const colors = new Float32Array(MAX_POINTS * 3);
        for (let i=0;i<MAX_POINTS;i++){
            // initialize off-screen
            positions[i*3+0] = 0;
            positions[i*3+1] = 0;
            positions[i*3+2] = 0;
            colors[i*3+0] = 0.2;
            colors[i*3+1] = 0.6;
            colors[i*3+2] = 1.0;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({ size: 0.08, vertexColors: true });
        points = new THREE.Points(geometry, material);
        scene.add(points);

        // simple axis helper
        const axes = new THREE.AxesHelper(1.5);
        scene.add(axes);

        window.addEventListener('resize', onCloudResize);
        animateCloud();
    }

    function onCloudResize(){
        if(!renderer) return;
        const w = cloudContainer.clientWidth;
        const h = cloudContainer.clientHeight;
        renderer.setSize(w,h);
        camera.aspect = w/h;
        camera.updateProjectionMatrix();
    }

    function animateCloud(){
        requestAnimationFrame(animateCloud);
        if(points) points.rotation.y += 0.004;
        if(renderer) renderer.render(scene, camera);
    }

    // Map telemetry arrays to 3D points
    function updateCloudFromTelemetry(telemetry){
        if(!geometry) return;
        const xs = telemetry.x.history || [];
        const ys = telemetry.y.history || [];
        const zs = telemetry.z.history || [];
        const n = Math.min(MAX_POINTS, Math.max(xs.length, ys.length, zs.length));

        // scale for visibility
        const SCALE = 0.6;
        const pos = geometry.attributes.position.array;
        let base = MAX_POINTS - n;
        for(let i=0;i<MAX_POINTS;i++){
            const idx = i - base;
            if(idx >= 0 && idx < n){
                const x = xs[idx] || 0;
                const y = ys[idx] || 0;
                const z = zs[idx] || 0;
                pos[i*3+0] = x * SCALE;
                pos[i*3+1] = y * SCALE;
                pos[i*3+2] = z * SCALE;
            } else {
                pos[i*3+0] = 0;
                pos[i*3+1] = 0;
                pos[i*3+2] = 0;
            }
        }
        geometry.attributes.position.needsUpdate = true;
    }

    // Initialize cloud when DOM ready
    window.addEventListener('load', () => {
        try { initCloud(); } catch(e){ console.warn('3D cloud init failed', e); }
    });

    // Hook into the telemetry updater by monkey-patching updateTelemetry
    const _origUpdate = updateTelemetry;
    async function updateTelemetryAndCloud(){
        await _origUpdate();
        try{
            const resp = await fetch('/api/session/current');
            const data = await resp.json();
            if(data.status === 'active'){
                updateCloudFromTelemetry(data.telemetry);
            }
        }catch(e){/* ignore */}
    }
    // replace interval caller
    clearInterval();
    setInterval(updateTelemetryAndCloud, 500);
</script>
